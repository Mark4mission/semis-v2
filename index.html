<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex">
<title>SeMIS v2 · 보안종합정보시스템</title>
<link rel="icon" type="image/svg+xml" href="assets/logo.svg">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" onerror="/* CDN 차단 시 목록 폴백 */">
<link rel="stylesheet" href="css/main.css">
</head>
<body>

<!-- ═══════════ 로그인 모달 ═══════════ -->
<div id="login-overlay" class="login-overlay">
  <div class="login-card">
    <div class="login-logo"><img src="assets/logo.svg" alt="AirZeta 보안 로고"></div>
    <h1 class="login-title">SeMIS <span>v2</span></h1>
    <p class="login-sub">에어제타 보안종합정보시스템<br>Security Management Information System</p>
    <form id="login-form" autocomplete="off">
      <div class="login-input-wrap">
        <input type="password" id="login-pw" placeholder="접속 암호를 입력하세요" autocomplete="current-password" autofocus>
        <button type="button" id="pw-toggle" class="pw-toggle" tabindex="-1" aria-label="암호 표시">👁</button>
      </div>
      <button type="submit" class="btn btn-primary login-btn">로그인</button>
      <p id="login-error" class="login-error"></p>
    </form>
    <p class="login-foot">에어제타 항공보안팀 · 인가된 사용자 전용</p>
  </div>
</div>

<!-- ═══════════ 앱 셸 ═══════════ -->
<div id="app" class="app hidden">

  <!-- 헤더 -->
  <header class="header">
    <button id="menu-toggle" class="icon-btn" aria-label="메뉴">☰</button>
    <a class="brand" href="#/dashboard">
      <span class="brand-logo"><img src="assets/logo.svg" alt=""></span>
      <span class="brand-text">SeMIS <b>v2</b></span>
      <span class="brand-sub">보안종합정보시스템</span>
    </a>
    <div class="header-right">
      <button id="sync-status" class="sync-dot" title="동기화 상태"></button>
      <span id="sec-level-badge" class="sec-badge" title="현재 국가 항공보안등급"></span>
      <span id="user-chip" class="user-chip"></span>
      <button id="logout-btn" class="icon-btn" title="로그아웃">⏻</button>
    </div>
  </header>

  <!-- 사이드바 -->
  <nav id="sidebar" class="sidebar">
    <div id="nav-menu" class="nav-menu"></div>
    <div class="sidebar-foot">
      <div>에어제타 항공보안팀</div>
      <div id="app-version"></div>
    </div>
  </nav>
  <div id="sidebar-backdrop" class="sidebar-backdrop"></div>

  <!-- 메인 -->
  <main id="main" class="main">
    <div id="view" class="view"></div>
  </main>
</div>

<!-- 범용 모달 -->
<div id="modal-overlay" class="modal-overlay hidden">
  <div id="modal-box" class="modal-box" role="dialog" aria-modal="true"></div>
</div>

<!-- 토스트 -->
<div id="toast-wrap" class="toast-wrap"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js" onerror="/* CDN 차단 시 폴링 폴백 */"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js" onerror="/* CDN 차단 시 지점 목록 폴백 */"></script>
<script src="js/app.js"></script>
<script src="js/modules.js"></script>
<script src="js/calendar.js"></script>
<script src="js/inspection.js"></script>
<script src="js/contacts.js"></script>
<script src="js/branches.js"></script>
<script src="js/passes.js"></script>
<script src="js/equipment.js"></script>
<script src="js/training.js"></script>
<script src="js/contracts.js"></script>
<script src="js/cares.js"></script>
<script src="js/sync.js"></script>
<script>
  SeMIS.boot();
  if (window.SemisSync) SemisSync.init();
  if (window.SemisCalendar) SemisCalendar.startReminders();
</script>
</body>
</html>
