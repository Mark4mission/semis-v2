      <stop offset="0" stop-color="#b93a56"/>
      <stop offset="1" stop-color="#1e3a8a"/>
    </linearGradient>
    <path id="shield" d="M50 3
           C 38 9, 22 13, 9 13.5
           L 9 52
           C 9 78, 27 96, 50 107
           C 73 96, 91 78, 91 52
