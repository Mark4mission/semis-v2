  <use href="#shield" fill="#ffffff" transform="translate(50,55) scale(0.958) translate(-50,-55)"/>
  <!-- 마크: 상단 빨강 / 하단 파랑 평행사변형, 중앙 흰 라운드 노치로 맞물림 -->
